name: React CI/CD

on:
  push:
    branches: [ develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 리포지토리 체크아웃
      - name: Checkout
        uses: actions/checkout@v3

      # 2️⃣ Node.js 환경 설정
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3️⃣ 의존성 설치
      - name: Install dependencies
        run: npm ci

      # 4️⃣ React 빌드
      - name: Build React app
        run: npm run build

      # 5️⃣ 배포 파일(zip) 생성
      - name: Make zip file
        run: zip -qq -r ./$GITHUB_SHA.zip dist appspec.yml scripts/

      # 6️⃣ AWS 인증
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.ACCESS_KEY_SECRET }}
          aws-region: ap-northeast-2

      # 7️⃣ S3 업로드
      - name: Upload to S3
        run: aws s3 cp ./$GITHUB_SHA.zip s3://helloworldawsll/$GITHUB_SHA.zip

      # 8️⃣ CodeDeploy 배포
      - name: Code Deploy
        run: |
          aws deploy create-deployment \
            --application-name clueFront \
            --deployment-group-name CLUE_DEPLOY_FRONT \
            --deployment-config-name CodeDeployDefault.AllAtOnce \
            --s3-location bucket=helloworldawsll,bundleType=zip,key=$GITHUB_SHA.zip
